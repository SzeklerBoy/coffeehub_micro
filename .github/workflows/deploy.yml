name: CoffeeHub CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-push:
    name: Docker Image Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./laravel-gateaway
          push: true
          tags: petercsongor/micro-gateway-app:latest

      - name: Build and Push Menu Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./menu-fastapi
          push: true
          tags: petercsongor/micro-menu-app:latest

      - name: Build and Push Desk Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./desk-service-go
          push: true
          tags: petercsongor/micro-desk-app:latest

      - name: Build and Push Order Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service-node
          push: true
          tags: petercsongor/micro-order-app:latest

  deploy-to-k8s:
    name: Automatic Kubernetes Deployment Update
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |

            kubectl apply -f k8s/01-configmap.yml
            kubectl apply -f k8s/02-secret.yml
            kubectl apply -f k8s/03-databases.yml
            kubectl apply -f k8s/04-apps.yml
            kubectl apply -f k8s/05-ingress.yml

            kubectl rollout restart deployment/gateway-app
            kubectl rollout restart deployment/menu-app
            kubectl rollout restart deployment/desk-app
            kubectl rollout restart deployment/order-app
