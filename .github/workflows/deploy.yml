name: CoffeeHub CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-push:
    name: Docker Image Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./laravel-gateaway
          push: true
          tags: petercsongor/micro-gateway-app:latest

  deploy-to-k8s:
    name: Automatic Kubernetes Deployment Update
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute SSH Command on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl rollout restart deployment gateway-app