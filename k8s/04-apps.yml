apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-app
  template:
    metadata:
      labels:
        app: order-app
    spec:
      containers:
        - name: order-app
          image: petercsongor/micro-order-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cafe-config
                  key: ORDER_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cafe-config
                  key: ORDER_DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_PASS
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_NAME
---
apiVersion: v1
kind: Service
metadata:
  name: order-app
spec:
  ports:
    - port: 8003
  selector:
    app: order-app
