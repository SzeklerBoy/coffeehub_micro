apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-app
  template:
    metadata:
      labels:
        app: gateway-app
    spec:
      containers:
        - name: gateway-app
          image: petercsongor/micro-gateway-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cafe-config
            - secretRef:
                name: cafe-secret
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-app
spec:
  ports:
    - port: 8000
  selector:
    app: gateway-app

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: menu-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: menu-app
  template:
    metadata:
      labels:
        app: menu-app
    spec:
      containers:
        - name: menu-app
          image: petercsongor/micro-menu-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: MENU_DB_URL
---
apiVersion: v1
kind: Service
metadata:
  name: menu-app
spec:
  ports:
    - port: 8001
  selector:
    app: menu-app

---

