apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cafe-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafe-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cafe-db
  template:
    metadata:
      labels:
        app: cafe-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: MAIN_DB_ROOT_PASS
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: MAIN_DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: MAIN_DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: MAIN_DB_PASS
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: cafe-db-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: cafe-db-storage
          persistentVolumeClaim:
            claimName: cafe-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cafe-db
spec:
  ports:
    - port: 3306
  selector:
    app: cafe-db

---

