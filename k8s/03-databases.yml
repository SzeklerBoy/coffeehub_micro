apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_ROOT_PASS
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cafe-secret
                  key: ORDER_DB_PASS
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: order-db-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: order-db-storage
          persistentVolumeClaim:
            claimName: order-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
spec:
  ports:
    - port: 3306
  selector:
    app: order-db