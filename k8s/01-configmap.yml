apiVersion: v1
kind: ConfigMap
metadata:
  name: cafe-config
data:
  # App Configuration
  APP_NAME: "CoffeeHub"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_TIMEZONE: "UTC"
  APP_URL: "http://localhost"
  APP_LOCALE: "en"
  APP_FALLBACK_LOCALE: "en"
  APP_FAKER_LOCALE: "en_US"
  APP_MAINTENANCE_DRIVER: "file"

  # Database Configuration
  DB_CONNECTION: "mysql"
  DB_HOST: "cafe-db"
  DB_PORT: "3306"
  DB_CHARSET: "utf8mb4"
  DB_COLLATION: "utf8mb4_unicode_ci"
  DB_FOREIGN_KEYS: "true"

  # Broadcast & Queue
  BROADCAST_CONNECTION: "log"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "database"
  CACHE_PREFIX: ""

  # Session Configuration
  SESSION_DRIVER: "database"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "null"

  # Filesystem
  FILESYSTEM_DISK: "local"

  # Logging
  LOG_CHANNEL: "stack"
  LOG_STACK: "single"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "debug"

  # Redis Configuration
  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "127.0.0.1"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"

  # Memcached
  MEMCACHED_HOST: "127.0.0.1"
  MEMCACHED_PORT: "11211"

  # AWS S3 Configuration
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  AWS_ENDPOINT_URL: "http://localhost:4566"

  # Mail Configuration
  MAIL_MAILER: "smtp"
  MAIL_HOST: "sandbox.smtp.mailtrap.io"
  MAIL_PORT: "2525"
  MAIL_ENCRYPTION: "null"
  MAIL_FROM_ADDRESS: "admin@coffeehub.com"
  MAIL_FROM_NAME: "CoffeeHub"

  # Pusher Configuration
  PUSHER_HOST: ""
  PUSHER_PORT: "443"
  PUSHER_SCHEME: "https"
  PUSHER_APP_CLUSTER: "eu"

  # Microservices URLs
  MENU_SERVICE_URL: "http://menu-app:8001/api"
  DESK_SERVICE_URL: "http://desk-app:8002/api"
  ORDER_SERVICE_URL: "http://order-app:8003/api"

  # Security
  BCRYPT_ROUNDS: "12"

  ORDER_DB_HOST: "order-db"
  ORDER_DB_PORT: "3306"